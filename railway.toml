[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @arkscore/api build"
watchPatterns = [
  "/apps/api/**",
  "/packages/shared/**",
  "/config/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
  "/railway.toml"
]

[deploy]
startCommand = "pnpm --filter @arkscore/api start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
